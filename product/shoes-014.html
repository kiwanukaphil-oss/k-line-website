<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brown Double Monk Strap — K-LINE MEN</title>
  <meta name="description" content="Burnished brown leather, double monk strap — the dress shoe with personality.">
  <base href="../">
  <link rel="canonical" href="https://k-line-men.com/product/shoes-014.html">
  <meta property="og:type" content="product">
  <meta property="og:title" content="Brown Double Monk Strap — K-LINE MEN">
  <meta property="og:description" content="Burnished brown leather, double monk strap — the dress shoe with personality.">
  <meta property="og:image" content="https://k-line-men.com/assets/images/shoes/shoes-014.png">
  <meta property="og:url" content="https://k-line-men.com/product/shoes-014.html">
  <meta name="twitter:card" content="summary_large_image">
  <script type="application/ld+json" id="jsonld-product">{"@context":"https://schema.org","@type":"Product","name":"Brown Double Monk Strap","description":"Burnished brown leather, double monk strap — the dress shoe with personality.","sku":"SHOES-014","image":"https://k-line-men.com/assets/images/shoes/shoes-014.png","url":"https://k-line-men.com/product/shoes-014.html","brand":{"@type":"Brand","name":"K-LINE MEN"},"category":"Shoes","offers":{"@type":"Offer","priceCurrency":"UGX","price":420000,"availability":"https://schema.org/InStock","url":"https://k-line-men.com/product/shoes-014.html","seller":{"@type":"Organization","name":"K-LINE MEN"}},"color":"Brown"}</script>
  <script type="application/ld+json" id="jsonld-breadcrumb">{"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Home","item":"https://k-line-men.com/"},{"@type":"ListItem","position":2,"name":"Shop","item":"https://k-line-men.com/shop.html"},{"@type":"ListItem","position":3,"name":"Shoes","item":"https://k-line-men.com/shop.html?cat=shoes"},{"@type":"ListItem","position":4,"name":"Brown Double Monk Strap","item":"https://k-line-men.com/product/shoes-014.html"}]}</script>
  <script>window.PRODUCT_ID = "shoes-014";</script>

  <!-- Favicons + PWA manifest, generated by scripts/generate-favicons.mjs -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#111827">
  <link rel="stylesheet" href="assets/fonts/fonts.css">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    /* PDP-only: when there's only one image, drop the thumb column */
    .pdp-gallery.single { grid-template-columns: 1fr; }
    .pdp-gallery.single .thumbs { display: none; }
    .breadcrumbs {
      padding: 18px 0 0;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }
    .breadcrumbs a:hover { color: var(--ink); }
    .breadcrumbs span { margin: 0 8px; opacity: .5; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main>
    <div class="container breadcrumbs" id="breadcrumbs"></div>

    <section style="padding-top:32px;">
      <div class="container">
        <div class="pdp" id="pdp"></div>
      </div>
    </section>

    <section class="warm-section">
      <div class="container">
        <div class="section-head">
          <div class="section-title">
            <div class="eyebrow">You might also like</div>
            <h2 style="font-size:clamp(30px, 4vw, 46px);">More from this category.</h2>
          </div>
        </div>
        <div class="product-grid" id="related"></div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="assets/js/products.js"></script>
  <script src="assets/js/site.js"></script>
  <script>
    SITE.mount('shop');

    /* ───── Resolve product ─────
       Pre-rendered pages (/product/{id}.html) set window.PRODUCT_ID before
       products.js loads; the dynamic /product.html?id=X URL falls through to
       the URL parameter. Both paths converge on the same render code. */
    const params = new URLSearchParams(location.search);
    const id = window.PRODUCT_ID || params.get('id');
    const product = id && KLINE.byId(id);

    if (!product) {
      document.getElementById('pdp').innerHTML = ''
        + '<div style="padding:60px; text-align:center; grid-column: 1 / -1;">'
        +   '<h1 style="font-family:var(--display); font-size:48px; margin-bottom:12px; font-weight:600;">Product not found</h1>'
        +   '<p style="color:var(--muted); margin-bottom:24px;">The product you\'re looking for may have been moved or sold out.</p>'
        +   '<a class="btn btn-primary" href="shop.html">Back to shop</a>'
        + '</div>';
      document.getElementById('related').remove();
    } else {
      document.title = product.name + ' — K-LINE MEN';
      document.querySelector('meta[name="description"]').setAttribute('content', product.description || (product.name + ' from K-LINE MEN.'));

      // Canonical URL points at the SEO-clean pre-rendered URL even when the
      // user is on /product.html?id=X — search engines will index the
      // canonical and treat the query-string URL as a duplicate.
      const canonicalUrl = 'https://k-line-men.com/product/' + product.id + '.html';
      let canonical = document.querySelector('link[rel="canonical"]');
      if (!canonical) {
        canonical = document.createElement('link');
        canonical.rel = 'canonical';
        document.head.appendChild(canonical);
      }
      canonical.href = canonicalUrl;

      // Product + Offer + Breadcrumb JSON-LD. Skipped if the pre-rendered HTML
      // already shipped a static version (helper checks for the script id).
      SITE.injectProductJSONLD(product);

      /* ───── Breadcrumbs ───── */
      document.getElementById('breadcrumbs').innerHTML = ''
        + '<a href="index.html">Home</a><span>/</span>'
        + '<a href="shop.html">Shop</a><span>/</span>'
        + '<a href="shop.html?cat=' + product.category + '">' + SITE.categoryLabel(product.category) + '</a><span>/</span>'
        + '<span style="color:var(--ink); opacity:1;">' + product.name + '</span>';

      /* ───── Render PDP ───── */
      // Gallery: primary product.image plus any extras in product.gallery
      // (optional array, see products.js header). Single-image products keep
      // the .single class so the CSS collapses the thumb column. Multi-image
      // products render one thumb per shot, with the first marked active and
      // matching the initial main image.
      const wishActive = SITE.inWishlist(product.id) ? ' is-active' : '';
      const wishIcon = SITE.inWishlist(product.id) ? SITE.icons.heartFill : SITE.icons.heart;

      const galleryImages = [product.image].concat(product.gallery || []);
      const isSingleImage = galleryImages.length === 1;
      const thumbsHTML = isSingleImage ? '' : galleryImages.map((src, i) => ''
        + '<button type="button" class="thumb' + (i === 0 ? ' active' : '') + '" '
        +   'data-src="' + src + '" '
        +   'aria-label="View image ' + (i + 1) + ' of ' + galleryImages.length + '">'
        +   SITE.pictureHTML(src, '', { sizes: '84px' })
        + '</button>'
      ).join('');

      const pdpHTML = ''
        + '<div class="pdp-gallery' + (isSingleImage ? ' single' : '') + '">'
        +   '<div class="thumbs">' + thumbsHTML + '</div>'
        +   '<div class="pdp-main">' + SITE.pictureHTML(galleryImages[0], product.name, { eager: true, sizes: '(max-width:980px) 100vw, 50vw' }) + '</div>'
        + '</div>'
        + '<div class="pdp-info">'
        +   '<div class="category-tag">' + SITE.categoryLabel(product.category) + '</div>'
        +   '<h1>' + product.name + '</h1>'
        +   '<p class="pdp-summary">' + (product.description || '') + '</p>'
        +   '<div class="pdp-price">' + KLINE.formatUGX(product.price) + '</div>'

        +   (product.color ? ''
        +     '<div class="option-row">'
        +       '<div class="option-label"><span>Colour: ' + product.color.name + '</span></div>'
        +       '<div class="color-options"><span class="color-option active" style="background:' + product.color.hex + '" title="' + product.color.name + '"></span></div>'
        +     '</div>'
        :   '')

        +   (product.sizes && product.sizes[0] !== 'One Size' ? ''
        +     '<div class="option-row">'
        +       '<div class="option-label"><span>Choose size</span><button type="button" class="size-link" id="size-help">Need help?</button></div>'
        +       '<div class="size-options" id="size-options">'
        +         product.sizes.map(s => '<button type="button" class="size-option" data-size="' + s + '">' + s + '</button>').join('')
        +       '</div>'
        +     '</div>'
        :   '<input type="hidden" id="hidden-size" value="' + (product.sizes && product.sizes[0] || '') + '">')

        +   '<div class="qty-row">'
        +     '<span class="label">Quantity</span>'
        +     '<div class="qty">'
        +       '<button type="button" id="qty-minus" aria-label="Decrease">−</button>'
        +       '<input type="text" id="qty-input" value="1" inputmode="numeric" aria-label="Quantity">'
        +       '<button type="button" id="qty-plus" aria-label="Increase">+</button>'
        +     '</div>'
        +     '<button class="icon-btn' + wishActive + '" id="pdp-wish" data-id="' + product.id + '" aria-label="Add to wishlist">' + wishIcon + '</button>'
        +   '</div>'

        +   '<div class="pdp-actions">'
        +     '<button class="btn btn-primary" id="add-to-cart">Add to bag</button>'
        +     '<button class="btn btn-whatsapp" id="ask-whatsapp"><span class="whatsapp-dot"></span> Ask on WhatsApp</button>'
        +   '</div>'

        +   '<details class="accordion-item" open>'
        +     '<summary>Details<span></span></summary>'
        +     '<p>' + (product.description || product.name + '.') +
                  ' Shown in ' + (product.color ? product.color.name : 'main colour') +
                  '. Available in sizes ' + (product.sizes ? product.sizes.join(', ') : 'one size') + '.</p>'
        +   '</details>'
        +   '<details class="accordion-item">'
        +     '<summary>Delivery & pickup<span></span></summary>'
        +     '<p>Same-day delivery available within Kampala where possible. Countrywide delivery confirmed via WhatsApp — message us with your location for a delivery fee. Pickup available from our Kampala showroom.</p>'
        +   '</details>'
        +   '<details class="accordion-item">'
        +     '<summary>Returns & exchanges<span></span></summary>'
        +     '<p>If the size or fit isn\'t right, exchange within 7 days as long as items are unworn with tags. Final sale on accessories. Reach us on WhatsApp to start an exchange.</p>'
        +   '</details>'

        +   '<div class="pdp-share">SKU: ' + product.id.toUpperCase() + ' · Share: <a href="' + KLINE.whatsappUrl('Check this out from K-LINE MEN: ' + product.name + ' — ' + KLINE.formatUGX(product.price) + ' ' + location.href) + '" target="_blank" rel="noopener">WhatsApp</a></div>'
        + '</div>';

      document.getElementById('pdp').innerHTML = pdpHTML;

      /* ───── Wire interactions ───── */
      let selectedSize = (product.sizes && product.sizes[0] === 'One Size') ? 'One Size' : '';

      const sizeRow = document.getElementById('size-options');
      if (sizeRow) {
        sizeRow.addEventListener('click', e => {
          const btn = e.target.closest('.size-option');
          if (!btn) return;
          sizeRow.querySelectorAll('.size-option').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          selectedSize = btn.getAttribute('data-size');
        });
      }

      const qtyInput = document.getElementById('qty-input');
      function clampQty(n) { n = parseInt(n, 10); return isNaN(n) || n < 1 ? 1 : Math.min(n, 99); }
      document.getElementById('qty-minus').addEventListener('click', () => {
        qtyInput.value = clampQty(parseInt(qtyInput.value, 10) - 1);
      });
      document.getElementById('qty-plus').addEventListener('click', () => {
        qtyInput.value = clampQty(parseInt(qtyInput.value, 10) + 1);
      });
      qtyInput.addEventListener('input', () => { qtyInput.value = clampQty(qtyInput.value); });

      document.getElementById('add-to-cart').addEventListener('click', () => {
        if (product.sizes && product.sizes[0] !== 'One Size' && !selectedSize) {
          SITE.showToast('Please choose a size first');
          if (sizeRow) sizeRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
          return;
        }
        SITE.addToCart(product.id, selectedSize, parseInt(qtyInput.value, 10));
      });

      document.getElementById('ask-whatsapp').addEventListener('click', () => {
        SITE.askAboutProduct(product, selectedSize);
      });

      // Size help: open WhatsApp with a prefilled fit/sizing question scoped to
      // the current product. Replaces the previous unwired anchor that was
      // styled like a link but did nothing on click.
      const sizeHelp = document.getElementById('size-help');
      if (sizeHelp) {
        sizeHelp.addEventListener('click', () => {
          const msg = 'Hello K-LINE MEN, I need help choosing a size for:\n\n' +
                      product.name + '\n' +
                      KLINE.formatUGX(product.price) + '\n\n' +
                      'My usual size is: \nMy chest/waist measurements are: \n' +
                      'What would you recommend?';
          window.open(KLINE.whatsappUrl(msg), '_blank', 'noopener');
        });
      }

      // Gallery thumbs: clicking a thumb swaps the main image and marks the
      // new thumb active. No-op for single-image products since the thumbs
      // container is empty. Re-uses pictureHTML so the swapped main image
      // keeps WebP delivery + the same eager/priority hints as the initial
      // render.
      const thumbsContainer = document.querySelector('.pdp-gallery .thumbs');
      if (thumbsContainer && !isSingleImage) {
        thumbsContainer.addEventListener('click', e => {
          const thumb = e.target.closest('.thumb');
          if (!thumb) return;
          const src = thumb.getAttribute('data-src');
          if (!src) return;
          thumbsContainer.querySelectorAll('.thumb').forEach(b => b.classList.remove('active'));
          thumb.classList.add('active');
          const main = document.querySelector('.pdp-gallery .pdp-main');
          if (main) {
            main.innerHTML = SITE.pictureHTML(src, product.name, { eager: true, sizes: '(max-width:980px) 100vw, 50vw' });
          }
        });
      }

      // PDP wishlist heart — uses the same delegate by giving it data-id and
      // .wish-btn class via JS so the global handler picks it up.
      const pdpWish = document.getElementById('pdp-wish');
      pdpWish.classList.add('wish-btn');

      /* ───── Related products ───── */
      const related = KLINE.byCategory(product.category).filter(p => p.id !== product.id).slice(0, 4);
      document.getElementById('related').innerHTML = related.map(p => SITE.productCardHTML(p)).join('');
    }
  </script>
</body>
</html>
