<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Bag — K-LINE MEN</title>
  <meta name="description" content="Review your K-LINE MEN bag and check out via WhatsApp. Pay on delivery, by Mobile Money, bank transfer, or card.">
  <link rel="canonical" href="https://klinemen.ug/cart.html">
  <meta name="robots" content="noindex">
  <!-- Favicons + PWA manifest, generated by scripts/generate-favicons.mjs -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#111827">
  <link rel="stylesheet" href="assets/fonts/fonts.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div id="site-header"></div>

  <main>
    <section class="page-header">
      <div class="container">
        <div class="eyebrow">Your bag</div>
        <h1>Review &amp; checkout.</h1>
        <p>Confirm what you'd like and we'll continue on WhatsApp — fastest way to confirm sizes, delivery, and payment.</p>
      </div>
    </section>

    <section style="padding-top:48px;">
      <div class="container" id="cart-root"></div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="assets/js/products.js"></script>
  <script src="assets/js/site.js"></script>
  <script>
    SITE.mount('cart');

    function render() {
      const root = document.getElementById('cart-root');
      const cart = SITE.getCart();

      if (!cart.length) {
        root.innerHTML = ''
          + '<div class="empty-cart">'
          +   '<h3>Your bag is empty</h3>'
          +   '<p>Have a look through the collection — there\'s probably something in your size.</p>'
          +   '<a class="btn btn-primary" href="shop">Shop the collection</a>'
          + '</div>';
        return;
      }

      const itemsHTML = cart.map(item => {
        const p = KLINE.byId(item.id);
        if (!p) return '';
        const sub = p.price * item.qty;
        return ''
          + '<div class="cart-item" data-key="' + item.key + '">'
          +   '<a class="ci-image" href="product/' + p.id + '.html">' + SITE.pictureHTML(p.image, p.name, { sizes: '110px' }) + '</a>'
          +   '<div>'
          +     '<h3><a href="product/' + p.id + '.html">' + p.name + '</a></h3>'
          +     '<div class="ci-meta">' + (p.color ? p.color.name + ' · ' : '') + (item.size ? 'Size ' + item.size + ' · ' : '') + SITE.categoryLabel(p.category) + '</div>'
          +     '<div class="ci-price">' + KLINE.formatUGX(sub) + ' <span style="color:var(--muted); font-weight:600; font-size:13px;">(' + KLINE.formatUGX(p.price) + ' each)</span></div>'
          +   '</div>'
          +   '<div class="ci-actions">'
          +     '<div class="qty">'
          +       '<button type="button" class="qty-dec" data-key="' + item.key + '" aria-label="Decrease">−</button>'
          +       '<input type="text" class="qty-val" value="' + item.qty + '" data-key="' + item.key + '" inputmode="numeric" aria-label="Quantity">'
          +       '<button type="button" class="qty-inc" data-key="' + item.key + '" aria-label="Increase">+</button>'
          +     '</div>'
          +     '<button class="remove-btn" data-key="' + item.key + '">Remove</button>'
          +   '</div>'
          + '</div>';
      }).join('');

      const total = SITE.cartTotal();
      const summaryHTML = ''
        + '<aside class="cart-summary">'
        +   '<h3>Order summary</h3>'
        +   '<div class="row"><span>Items subtotal</span><span>' + KLINE.formatUGX(total) + '</span></div>'
        +   '<div class="row"><span>Delivery</span><span style="color:var(--muted);">Quoted on WhatsApp</span></div>'
        +   '<div class="row total"><span>Total</span><span>' + KLINE.formatUGX(total) + ' <span style="color:var(--muted); font-weight:700; font-size:13px;">+ delivery</span></span></div>'
        +   '<button class="btn btn-whatsapp btn-block" id="checkout" style="margin-top:18px;"><span class="whatsapp-dot"></span> Checkout on WhatsApp</button>'
        +   '<a class="btn btn-secondary btn-block" href="shop" style="margin-top:8px;">Keep shopping</a>'
        +   '<div class="checkout-steps" style="margin-top:18px; padding:16px; background:var(--warm); border-radius:var(--radius-sm); border:1px solid var(--line);">'
        +     '<p style="font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; color:var(--ink); margin-bottom:10px;">What happens next</p>'
        +     '<ol style="font-size:13px; color:var(--muted); line-height:1.6; padding-left:18px; margin:0;">'
        +       '<li>Your bag and total open in WhatsApp.</li>'
        +       '<li>We confirm sizes and stock.</li>'
        +       '<li>We quote the delivery fee for your location in Kampala or anywhere in Uganda.</li>'
        +       '<li>You pay on delivery, by Mobile Money, bank transfer, or card.</li>'
        +     '</ol>'
        +   '</div>'
        +   '<p style="margin-top:14px; font-size:11px; color:var(--muted); text-align:center; line-height:1.5;">Your bag is saved on this device only. To keep it across devices, message it to us on WhatsApp.</p>'
        + '</aside>';

      root.innerHTML = ''
        + '<div class="cart-layout">'
        +   '<div class="cart-list">' + itemsHTML + '</div>'
        +   summaryHTML
        + '</div>';

      // Wire qty controls + remove
      root.querySelectorAll('.qty-inc').forEach(b => b.addEventListener('click', () => {
        const key = b.getAttribute('data-key');
        const item = SITE.getCart().find(i => i.key === key);
        if (item) SITE.updateQty(key, item.qty + 1);
        render();
      }));
      root.querySelectorAll('.qty-dec').forEach(b => b.addEventListener('click', () => {
        const key = b.getAttribute('data-key');
        const item = SITE.getCart().find(i => i.key === key);
        if (item) SITE.updateQty(key, item.qty - 1);
        render();
      }));
      root.querySelectorAll('.qty-val').forEach(input => input.addEventListener('change', () => {
        const key = input.getAttribute('data-key');
        let n = parseInt(input.value, 10);
        if (isNaN(n) || n < 1) n = 1;
        if (n > 99) n = 99;
        SITE.updateQty(key, n);
        render();
      }));
      root.querySelectorAll('.remove-btn').forEach(b => b.addEventListener('click', () => {
        SITE.removeFromCart(b.getAttribute('data-key'));
        render();
      }));
      const checkout = document.getElementById('checkout');
      if (checkout) checkout.addEventListener('click', SITE.checkoutOnWhatsApp);
    }

    document.addEventListener('kline:cartchange', render);
    render();
  </script>
</body>
</html>
